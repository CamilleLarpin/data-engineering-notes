fail_fast: true
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Format with ruff
        entry: poetry run ruff format --check
        language: system
        types: [python]

      - id: ruff-lint
        name: Lint with ruff
        entry: poetry run ruff check --fix
        language: system
        types: [python]

      - id: improve-notes
        name: Improve markdown notes with Claude
        entry: poetry run python src/scripts/improve_notes.py
        language: system
        files: ^daily/.*notes.*\.md$
        pass_filenames: true
